        <script src="script.js">

            if(window.innerWidth <= 768){

    const banner = document.getElementById("banner");

    if(banner){

        let indice = 0;

        setInterval(()=>{

            indice++;

            if(indice >= banner.children.length){
                indice = 0;
            }

            banner.children[indice].scrollIntoView({

                behavior:"smooth",
                inline:"center"

            });

        },3000);

    }

}
        </script>
        <style>

body{
    overflow-x:hidden;
}

/* Header */

header{

    flex-direction:column;

    padding:15px;

    gap:15px;
}

.menu{

    width:100%;

    justify-content:center;

    flex-wrap:wrap;

    gap:10px;

    margin:0;
}

.menu a{

    font-size:17px;

    padding:8px 12px;
}

/* CARROSSEL */

#banner{

    display:flex;

    overflow-x:auto;

    overflow-y:hidden;

    flex-wrap:nowrap;

    scroll-snap-type:x mandatory;

    gap:15px;

    margin:20px 10px;

    padding:15px;

    scrollbar-width:none;
}

#banner::-webkit-scrollbar{

    display:none;
}

#banner .quadro{

    flex:0 0 85%;

    scroll-snap-align:center;
}

#banner img{

    width:100%;

    height:auto;

    object-fit:contain;
}

.estatisticas{

}

.numero{

}

}


}
