<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Biblioteca</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="src/images/logo.png">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <header>

        <nav class="menu">
            <a href="index.html">Início</a>
            <a href="catalogo.html">Catálogo</a>
            <a href="arquivos.html">Arquivos</a>
            <a href="sobre.html">Sobre</a>
        </nav>

        <input
            id="search"
            type="search"
            placeholder="Buscar livro, autor ou área">

        <div id="search-button"></div>

    </header>
    <style>
        /* Área da tabela */

#lista-div{
    width:100%;
    display:flex;
    justify-content:center;
    padding:25px 0;
}

.tabela-container{
    width:100%;
    max-width:1800px;
       

}

#lista{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
    background:#fff;
    border-radius:15px;
     border: solid 1px #000000;
    overflow:hidden;
}

/* Cabeçalho */

#lista th{
    background:#722F37;
    color:#fff;
    padding:10px;
    text-align:left;
}

/* Linhas */

#lista td{
    padding:8px;
    border-bottom:1px solid #ddd;

    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
}

/* Largura das colunas */

#lista th:nth-child(1),
#lista td:nth-child(1){
    width:2%;
}

#lista th:nth-child(2),
#lista td:nth-child(2){
    width:10%;
}

#lista th:nth-child(3),
#lista td:nth-child(3){
    width:45%;
}

#lista th:nth-child(4),
#lista td:nth-child(4){
    width:3%;
    text-align:center;
}

#lista th:nth-child(5),
#lista td:nth-child(5){
    width:5%;
}

/* Pesquisa */

#search{
    width:290px;
    height:42px;
    padding:0 12px;
    border-radius:10px;
    border:none;
    font-size:18px;
}

/* Responsividade */

@media (max-width:768px){

    header{
        flex-direction:column;
        gap:15px;
    }

    .menu{
        justify-content:center;
        flex-wrap:wrap;
        gap:8px;
        margin:0;
    }

    #search{
        width:95%;
    }

    .tabela-container{
        width:95%;
    }

    #lista{
        font-size:12px;
    }

    #lista th,
    #lista td{
        padding:5px 4px;
    }

    #lista th:nth-child(1),
    #lista td:nth-child(1){
        width:8%;
    }

    #lista th:nth-child(2),
    #lista td:nth-child(2){
        width:22%;
    }

    #lista th:nth-child(3),
    #lista td:nth-child(3){
        width:38%;
    }

    #lista th:nth-child(4),
    #lista td:nth-child(4){
        width:6%;
    }

    #lista th:nth-child(5),
    #lista td:nth-child(5){
        width:18%;
    }
}
    </style>

    <main>

        <div id="lista-div">

            <div class="tabela-container">

                <table id="lista"></table>

            </div>

        </div>

    </main>

    <footer>

    </footer>

    <script src="script.js"></script>

</body>

</html>
