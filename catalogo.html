        <style>
            #lista-div{
    width:100%;
    display:flex;
    justify-content:center;
    padding:25px;
    box-sizing:border-box;
}

.tabela-container{
    width:100%;
    max-width:2500px;
    overflow-x:auto;
    border-radius:15px;
}

#lista{
    width:100%;
    min-width:700px;
    border-collapse:collapse;
    background:#fff;
}

#lista th,
#lista td{
    padding:12px 15px;
    white-space:nowrap;
}

#lista th{
    background:#722F37;
    color:#fff;
    position:sticky;
    top:0;
}
            table th {
    height: 0;
}

table th {
    color: #fff;
    border: 0px solid #000;
}
            @media (max-width:768px){

body{
    overflow-x:hidden;
}

/* Header */

header{
    flex-direction:column;
    align-items:center;
    gap:15px;
    padding:15px;
}

.menu{
    width:100%;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:8px;
    margin:0;
}

.menu a{
    font-size:16px;
    padding:8px 12px;
}

#search{
    width:100% !important;
    max-width:none;
    box-sizing:border-box;
}

/* Tabela */

#lista-div{
    padding:10px;
}

.tabela-container{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    border-radius:12px;
}

#lista{
    min-width:650px;
    font-size:14px;
}

#lista th,
#lista td{
    padding:10px;
}

/* Esconde a barra horizontal */

.tabela-container::-webkit-scrollbar{
    height:6px;
}

.tabela-container::-webkit-scrollbar-thumb{
    background:#999;
    border-radius:10px;
}


}
